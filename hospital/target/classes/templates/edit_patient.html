<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Edit Patient</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-5">

<h2 class="text-center">Update Patient</h2>

<form th:action="@{/patients/update}" th:object="${patient}" method="post">

<input type="hidden" th:field="*{id}">

<div class="mb-3">
<label>Name</label>
<input type="text" th:field="*{name}" class="form-control">
</div>

<div class="mb-3">
<label>Age</label>
<input type="number" th:field="*{age}" class="form-control">
</div>

<div class="mb-3">
<label>Gender</label>

<select th:field="*{gender}" class="form-control">

<option value="Male">Male</option>

<option value="Female">Female</option>

</select>

</div>

<div class="mb-3">
<label>Disease</label>
<input type="text" th:field="*{disease}" class="form-control">
</div>

<div class="mb-3">
<label>Contact</label>
<input type="text" th:field="*{contact}" class="form-control">
</div>

<button type="submit" class="btn btn-success">
Update Patient
</button>

<a href="/patients" class="btn btn-secondary">
Back
</a>

</form>

</div>

</body>
</html>
