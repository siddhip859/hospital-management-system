<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<style>

body{
background-image:url("https://img.freepik.com/free-photo/blur-hospital-clinic-interior-background_1203-7983.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
min-height:100vh;
}

.dashboard-card{
background: rgba(255,255,255,0.95);
border-radius:15px;
padding:20px;
box-shadow:0px 8px 20px rgba(0,0,0,0.2);
transition:0.3s;
}

.dashboard-card:hover{
transform:scale(1.05);
}

</style>
<title>Hospital Dashboard</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

<span class="navbar-brand">Hospital Management System</span>

</div>

</nav>


<div class="container mt-5">

<div class="row justify-content-center text-center g-4">

<!-- PATIENT -->

<div class="col-md-3">

<div class="card dashboard-card">

<img src="https://cdn-icons-png.flaticon.com/512/3774/3774299.png" class="card-img">

<div class="card-body">

<h5>Patients</h5>

<a href="/patients" class="btn btn-primary">Manage</a>

</div>

</div>

</div>


<!-- DOCTOR -->

<div class="col-md-3">

<div class="card dashboard-card">

<img src="https://cdn-icons-png.flaticon.com/512/4320/4320371.png" class="card-img">

<div class="card-body">

<h5>Doctors</h5>

<a href="/doctors" class="btn btn-success">Manage</a>

</div>

</div>

</div>


<!-- APPOINTMENT -->

<div class="col-md-3">

<div class="card dashboard-card">

<img src="https://cdn-icons-png.flaticon.com/512/2921/2921222.png" class="card-img">

<div class="card-body">

<h5>Appointments</h5>

<a href="/appointments" class="btn btn-warning">Manage</a>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
