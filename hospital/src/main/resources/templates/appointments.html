<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<style>

body{
background-image:url("https://img.freepik.com/free-photo/hospital-blur-background_1203-7971.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

.container{
background:rgba(255,255,255,0.95);
padding:20px;
border-radius:10px;
margin-top:40px;
}

</style>
<title>Appointments</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-4">

<h2>Appointments</h2>

<form th:action="@{/appointments/save}" method="post">

<div class="row mb-3">

<div class="col">
<input type="text" name="patientName" placeholder="Patient Name" class="form-control">
</div>

<div class="col">
<input type="text" name="doctorName" placeholder="Doctor Name" class="form-control">
</div>

<div class="col">
<input type="date" name="date" class="form-control">
</div>

<div class="col">
<input type="time" name="time" class="form-control">
</div>

<div class="col">
<button class="btn btn-primary">Book</button>
</div>

</div>

</form>

<table class="table table-bordered">

<tr>

<th>ID</th>
<th>Patient</th>
<th>Doctor</th>
<th>Date</th>
<th>Time</th>
<th>Action</th>

</tr>

<tr th:each="a : ${appointments}">

<td th:text="${a.id}"></td>
<td th:text="${a.patientName}"></td>
<td th:text="${a.doctorName}"></td>
<td th:text="${a.date}"></td>
<td th:text="${a.time}"></td>

<td>
<a th:href="@{/appointments/delete/{id}(id=${a.id})}"
class="btn btn-danger">Cancel</a>
</td>

</tr>

</table>

</div>

</body>
</html>
