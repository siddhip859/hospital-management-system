<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<style>

body{
background-image:url("https://img.freepik.com/free-photo/medical-banner-with-stethoscope_23-2149611195.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

.container{
background:rgba(255,255,255,0.95);
padding:20px;
border-radius:10px;
margin-top:40px;
}

</style>
<title>Doctors</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-4">

<h2>Doctors</h2>

<form th:action="@{/doctors/save}" th:object="${doctor}" method="post">

<input type="hidden" name="id" th:value="${doctor.id}">

<div class="row mb-3">

<div class="col">
<input type="text" th:field="*{name}" placeholder="Doctor Name" class="form-control">
</div>

<div class="col">
<input type="text" th:field="*{specialization}" placeholder="Specialization" class="form-control">
</div>

<div class="col">
<input type="text" th:field="*{contact}" placeholder="Contact" class="form-control">
</div>

<div class="col">
<input type="text" th:field="*{experience}" placeholder="Experience" class="form-control">
</div>

<div class="col">
<button class="btn btn-success">Add Doctor</button>
</div>

</div>

</form>
<table class="table table-bordered">

<tr>

<th>ID</th>
<th>Name</th>
<th>Specialization</th>
<th>Contact</th>
<th>Experience</th>
<th>Action</th>

</tr>

<tr th:each="d : ${doctors}">

<td th:text="${d.id}"></td>
<td th:text="${d.name}"></td>
<td th:text="${d.specialization}"></td>
<td th:text="${d.contact}"></td>
<td th:text="${d.experience}"></td>

<td>

<a th:href="@{/doctors/edit/{id}(id=${d.id})}"
class="btn btn-warning">Edit</a>

<a th:href="@{/doctors/delete/{id}(id=${d.id})}"
class="btn btn-danger">Delete</a>

</td>

</tr>

</table>

</div>

</body>
</html>
