<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<style>

body{
background-image:url("https://images.unsplash.com/photo-1587351021759-3e566b6af7cc");
background-size:cover;
background-position:center;
}

.table-container{
background:white;
padding:20px;
border-radius:10px;
}

</style>
<title>Patients</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>
<style>

body{
background-image:url("https://img.freepik.com/free-photo/doctor-with-stethoscope-hands-hospital-background_1423-1.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

.container{
background:rgba(255,255,255,0.95);
padding:20px;
border-radius:10px;
margin-top:40px;
}

</style>
<body>

<div class="container mt-5 table-container">
<h2 class="text-center">Patient List</h2>

<a href="/patients/add" class="btn btn-primary mb-3">Add Patient</a>

<table class="table table-bordered">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Gender</th>
<th>Disease</th>
<th>Contact</th>
<th>Action</th>

</tr>

</thead>

<tbody>

<tr th:each="p : ${patients}">

<td th:text="${p.id}"></td>
<td th:text="${p.name}"></td>
<td th:text="${p.age}"></td>
<td th:text="${p.gender}"></td>
<td th:text="${p.disease}"></td>
<td th:text="${p.contact}"></td>

<td>

<a th:href="@{/patients/edit/{id}(id=${p.id})}" 
class="btn btn-warning btn-sm">Edit</a>

<a th:href="@{/patients/delete/{id}(id=${p.id})}" 
class="btn btn-danger btn-sm">Delete</a>

</td>

</tr>

</tbody>

</table>

</div>

</body>

</html>
